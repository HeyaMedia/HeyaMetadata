root = ".dev/air"
tmp_dir = ".worker"

[build]
  # The API Air process owns compilation. This watcher only restarts the
  # separate worker process when that one shared binary is atomically replaced.
  # mprocs starts all panes concurrently. On a clean tree the API has not
  # produced the shared binary yet, so keep Air's initial build phase alive
  # until it exists; otherwise Air exits its runner before there is anything
  # useful to watch and background jobs silently remain offline.
  cmd = "while [ ! -x heya-metadata ]; do sleep 0.1; done"
  entrypoint = ["./heya-metadata", "worker"]
  # Go replaces binaries atomically, which does not reliably produce a file
  # event for every watcher. The API build touches this marker only after a
  # successful shared-binary build, giving the worker a deterministic restart.
  include_file = ["heya-metadata", "heya-metadata.worker-reload"]
  include_ext = ["*"]
  exclude_dir = [".worker"]
  delay = 250
  send_interrupt = true
  kill_delay = 2000
  stop_on_error = true
  # A pending migration or another startup-time failure must not leave the Air
  # pane alive while the River worker silently stays dead. Retry the runner;
  # normal River uniqueness makes this safe once the dependency recovers.
  rerun = true
  rerun_delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
