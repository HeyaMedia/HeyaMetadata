name: heya-metadata

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: heya_metadata
      POSTGRES_USER: heya_metadata
      POSTGRES_PASSWORD: heya_metadata_dev
    ports:
      - "127.0.0.1:5441:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heya_metadata -d heya_metadata"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
