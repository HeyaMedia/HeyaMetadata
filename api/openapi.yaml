        - title
        - provider
        - external_ids
        - resolution_state
      type: object
    TopTrackExternalID:
      additionalProperties: false
      properties:
        namespace:
          type: string
        provider:
          type: string
        value:
          type: string
      required:
        - provider
        - namespace
        - value
      type: object
    TopTrackSource:
      additionalProperties: false
      properties:
        item_count:
          format: int64
          type: integer
        observed_at:
          format: date-time
          type: string
        projection_version:
          format: int64
          type: integer
        provider:
          type: string
        reported_total:
          format: int64
          type: integer
        source_observation_id:
          type: string
        truncated:
          type: boolean
      required:
        - provider
        - item_count
        - reported_total
        - truncated
        - observed_at
        - projection_version
      type: object
    TopTracksPage:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/TopTracksPage.json
          format: uri
          readOnly: true
          type: string
        artist_id:
          format: uuid
          type: string
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        results:
          items:
            $ref: "#/components/schemas/TopTrack"
          nullable: true
          type: array
        sources:
          items:
            $ref: "#/components/schemas/TopTrackSource"
          nullable: true
          type: array
        total:
          format: int64
          type: integer
      required:
        - artist_id
        - results
        - sources
        - total
        - offset
        - limit
      type: object
    User:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        role:
          enum:
            - user
            - moderator
            - trusted
            - admin
          type: string
        username:
          type: string
      required:
        - id
        - username
        - role
        - created_at
      type: object
info:
  description: Canonical, provenance-aware metadata for Heya media servers.
  title: Heya Metadata API
  version: v2
openapi: 3.0.3
paths:
  /api/v2/admin/jobs:
    get:
      description: Returns queue state counts and a recent slice of jobs. Admin role required.
      operationId: admin-jobs
      parameters:
        - description: Opaque browser session
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session
            type: string
        - description: Optional Heya API key using the Bearer scheme
          in: header
          name: Authorization
          schema:
            description: Optional Heya API key using the Bearer scheme
            type: string
        - description: Filter by River state (available, running, retryable, scheduled, completed, cancelled, discarded); empty for all
          explode: false
          in: query
          name: state
          schema:
            description: Filter by River state (available, running, retryable, scheduled, completed, cancelled, discarded); empty for all
            type: string
        - description: Filter by job kind
          explode: false
          in: query
          name: kind
          schema:
            description: Filter by job kind
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 50
            format: int64
            maximum: 200
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobsBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Inspect the River job queue
      tags:
        - Admin
  /api/v2/admin/jobs/actions:
    post:
      description: clear_completed deletes finished job history; clear_queue deletes waiting (available/scheduled/retryable/pending) jobs; rescue_stuck requeues jobs stuck running past the abandonment threshold. Admin role required.
      operationId: admin-job-action
      parameters:
        - in: cookie
          name: __Host-heya_session
          schema:
            type: string
        - in: header
          name: Authorization
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminJobActionInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobActionOutputBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Bulk-manage the River job queue
      tags:
        - Admin
  /api/v2/anime/discoveries:
    post:
      operationId: discover-anime
      parameters:
        - description: respond-async or wait=N (maximum 5 seconds)
          in: header
          name: Prefer
          schema:
            description: respond-async or wait=N (maximum 5 seconds)
            type: string
        - description: Optional request-scoped TMDB API key; never persisted
          in: header
          name: X-Heya-TMDB-API-Key
          schema:
            description: Optional request-scoped TMDB API key; never persisted
            type: string
        - description: Optional request-scoped OMDb API key; never persisted
          in: header
          name: X-Heya-OMDB-API-Key
          schema:
            description: Optional request-scoped OMDb API key; never persisted
            type: string
        - description: Optional request-scoped TVDB API key; never persisted
          in: header
          name: X-Heya-TVDB-API-Key
          schema:
            description: Optional request-scoped TVDB API key; never persisted
            type: string
        - description: Optional request-scoped Fanart.tv personal API key; never persisted
          in: header
          name: X-Heya-Fanart-API-Key
          schema:
            description: Optional request-scoped Fanart.tv personal API key; never persisted
            type: string
        - description: Optional request-scoped Apple Music developer token; never persisted
          in: header
          name: X-Heya-Apple-API-Key
          schema:
            description: Optional request-scoped Apple Music developer token; never persisted
            type: string
        - description: Optional request-scoped Discogs token; never persisted
          in: header
          name: X-Heya-Discogs-API-Key
          schema:
            description: Optional request-scoped Discogs token; never persisted
            type: string
        - description: Optional request-scoped Last.fm API key; never persisted
          in: header
          name: X-Heya-LastFM-API-Key
          schema:
            description: Optional request-scoped Last.fm API key; never persisted
            type: string
        - description: Optional request-scoped Google Books API key; never persisted
          in: header
          name: X-Heya-Google-Books-API-Key
          schema:
            description: Optional request-scoped Google Books API key; never persisted
            type: string
        - description: Optional request-scoped MyAnimeList client ID; never persisted
          in: header
          name: X-Heya-MAL-Client-ID
          schema:
            description: Optional request-scoped MyAnimeList client ID; never persisted
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedicatedDiscoveryRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResource"
          description: OK
          headers:
            Retry-After:
              schema:
                type: string
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResource"
          description: Accepted for asynchronous processing
          headers:
            Retry-After:
              description: Suggested number of seconds before polling the returned resource or job
              schema:
                type: string
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResource"
          description: Processing failed after retries; the request may be submitted again
          headers:
            Retry-After:
              description: Suggested number of seconds before polling the returned resource or job
              schema:
                type: string
      summary: Discover anime identities
      tags:
        - Anime
        - Discovery
  /api/v2/anime/{id}:
    get:
      operationId: anime-detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
        - description: Preferred BCP 47 presentation language
          explode: false
          in: query
          name: language
          schema:
            description: Preferred BCP 47 presentation language
            type: string
        - description: Comma-separated ordered presentation language fallbacks
          explode: false
          in: query
          name: fallback_languages
          schema:
            description: Comma-separated ordered presentation language fallbacks
            type: string
        - description: Presentation preferences used after explicit query preferences
          in: header
          name: Accept-Language
          schema:
            description: Presentation preferences used after explicit query preferences
            type: string
        - description: Optional ISO 3166-1 alpha-2 presentation region
          explode: false
          in: query
          name: country
          schema:
            description: Optional ISO 3166-1 alpha-2 presentation region
            maxLength: 2
            minLength: 2
            type: string
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: OK
          headers:
            Server-Timing:
              schema:
                type: string
            Vary:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a canonical Anime entity
      tags:
        - Anime
  /api/v2/auth/api-keys:
    get:
      description: Lists active key metadata. Plaintext API keys are never returned after creation.
      operationId: list-api-keys
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListOutputBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: List the current user's API keys
      tags:
        - Authentication
    post:
      description: Returns the plaintext API key once. Only a non-reversible digest is retained afterward.
      operationId: create-api-key
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreateInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateOutputBody"
          description: Created
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Create a user API key
      tags:
        - Authentication
  /api/v2/auth/api-keys/{id}:
    delete:
      operationId: revoke-api-key
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Revoke a user API key
      tags:
        - Authentication
  /api/v2/auth/challenge:
    get:
      description: Returns an Altcha-style proof-of-work challenge the client solves before register/login. Returns 404 when the captcha is disabled.
      operationId: auth-challenge
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Issue a proof-of-work captcha challenge
      tags:
        - Authentication
  /api/v2/auth/login:
    post:
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Sign in with a local account
      tags:
        - Authentication
  /api/v2/auth/logout:
    post:
      operationId: auth-logout
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Cache-Control:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: End the current browser session
      tags:
        - Authentication
  /api/v2/auth/me:
    get:
      operationId: auth-me
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
        - description: Optional Heya API key using the Bearer scheme
          in: header
          name: Authorization
          schema:
            description: Optional Heya API key using the Bearer scheme
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Get the signed-in user
      tags:
        - Authentication
  /api/v2/auth/register:
    post:
      description: Creates a UUID-backed user, hashes the password with Argon2id, and starts an opaque browser session.
      operationId: auth-register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBody"
          description: Created
          headers:
            Cache-Control:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Create a local user account
      tags:
        - Authentication
  /api/v2/browse:
    get:
      operationId: browse-library
      parameters:
        - description: Optional local title/name query
          explode: false
          in: query
          name: q
          schema:
            description: Optional local title/name query
            maxLength: 200
            type: string
        - description: Optional exact canonical kind
          explode: false
          in: query
          name: kind
          schema:
            description: Optional exact canonical kind
            maxLength: 50
            type: string
        - explode: false
          in: query
          name: sort
          schema:
            default: updated
            enum:
              - updated
              - title
              - year
              - popular
            type: string
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int64
            minimum: 0
            type: integer
        - explode: false
          in: query
          name: limit
          schema:
            default: 24
            format: int64
            maximum: 100
            minimum: 1
            type: integer
        - description: Preferred presentation languages for compact titles and names
          in: header
          name: Accept-Language
          schema:
            description: Preferred presentation languages for compact titles and names
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseOutputBody"
          description: OK
          headers:
            Vary:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Browse canonical entities
      tags:
        - Library
  /api/v2/changes:
    get:
      description: Returns the persistent stream identity and current public head. Clients must reset to cursor zero and replay idempotently after change_stream_changed or change_cursor_ahead.
      operationId: public-changes
      parameters:
        - explode: false
          in: query
          name: after
          schema:
            format: int64
            minimum: 0
            type: integer
        - explode: false
          in: query
          name: limit
          schema:
            default: 100
            format: int64
            maximum: 500
            minimum: 1
            type: integer
        - description: Previously observed stream identity; a mismatch returns change_stream_changed
          explode: false
          in: query
          name: stream_id
          schema:
            description: Previously observed stream identity; a mismatch returns change_stream_changed
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangesOutputBody"
          description: OK
          headers:
            Server-Timing:
              schema:
                type: string
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: The supplied stream identity changed or the cursor is ahead of the available stream
          headers:
            Server-Timing:
              description: Origin database/read-model phase duration
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Read the gap-free public change feed
      tags:
        - Changes
  /api/v2/collections:
    get:
      operationId: collections-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Movie franchises encountered in canonical metadata
      tags:
        - Library
        - Collections
  /api/v2/collections/{id}:
    get:
      operationId: collection-detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionCard"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: One movie franchise and its known members
      tags:
        - Library
        - Collections
  /api/v2/comics/discoveries:
    post:
