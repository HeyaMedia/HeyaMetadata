info:
  description: Canonical, provenance-aware metadata for Heya media servers.
  title: Heya Metadata API
  version: v2
openapi: 3.0.3
paths:
  /api/v2/anime/discoveries:
    post:
      operationId: discover-anime
      parameters:
        - description: respond-async or wait=N (maximum 5 seconds)
          in: header
          name: Prefer
          schema:
            description: respond-async or wait=N (maximum 5 seconds)
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedicatedDiscoveryRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResource"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Discover AniDB anime identities
      tags:
        - Anime
        - Discovery
  /api/v2/anime/{id}:
    get:
      operationId: anime-detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
        - description: Preferred BCP 47 presentation language
          explode: false
          in: query
          name: language
          schema:
            description: Preferred BCP 47 presentation language
            type: string
        - description: Comma-separated ordered presentation language fallbacks
          explode: false
          in: query
          name: fallback_languages
          schema:
            description: Comma-separated ordered presentation language fallbacks
            type: string
        - description: Presentation preferences used after explicit query preferences
          in: header
          name: Accept-Language
          schema:
            description: Presentation preferences used after explicit query preferences
            type: string
        - description: Optional ISO 3166-1 alpha-2 presentation region
          explode: false
          in: query
          name: country
          schema:
            description: Optional ISO 3166-1 alpha-2 presentation region
            maxLength: 2
            minLength: 2
            type: string
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: OK
          headers:
            Vary:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a canonical Anime entity
      tags:
        - Anime
  /api/v2/auth/api-keys:
    get:
      description: Lists active key metadata. Plaintext API keys are never returned after creation.
      operationId: list-api-keys
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListOutputBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: List the current user's API keys
      tags:
        - Authentication
    post:
      description: Returns the plaintext API key once. Only a non-reversible digest is retained afterward.
      operationId: create-api-key
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreateInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateOutputBody"
          description: Created
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Create a user API key
      tags:
        - Authentication
  /api/v2/auth/api-keys/{id}:
    delete:
      operationId: revoke-api-key
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Revoke a user API key
      tags:
        - Authentication
  /api/v2/auth/challenge:
    get:
      description: Returns an Altcha-style proof-of-work challenge the client solves before register/login. Returns 404 when the captcha is disabled.
      operationId: auth-challenge
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Issue a proof-of-work captcha challenge
      tags:
        - Authentication
  /api/v2/auth/login:
    post:
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Sign in with a local account
      tags:
        - Authentication
  /api/v2/auth/logout:
    post:
      operationId: auth-logout
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Cache-Control:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: End the current browser session
      tags:
        - Authentication
  /api/v2/auth/me:
    get:
      operationId: auth-me
      parameters:
        - description: Opaque browser session; set and read only by the browser
          in: cookie
          name: __Host-heya_session
          schema:
            description: Opaque browser session; set and read only by the browser
            type: string
        - description: Optional Heya API key using the Bearer scheme
          in: header
          name: Authorization
          schema:
            description: Optional Heya API key using the Bearer scheme
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBody"
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
