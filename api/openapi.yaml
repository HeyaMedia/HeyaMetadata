      type: object
    ConnectivityRateLimitResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ConnectivityRateLimitResponse.json
          format: uri
          readOnly: true
          type: string
