  /v1/check:
    post:
      description: TLS-dials the caller's own public source IP and requested port, then verifies a short-lived challenge at /api/connectivity/probe. A caller sharing this service's public egress IP receives same_network without a misleading hairpin probe. The request can never select another target address.
      operationId: connectivity-check
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectivityCheckRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectivityCheckResult"
          description: Completed outside-in connectivity check
          headers:
            Retry-After:
              schema:
                type: string
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectivityRateLimitResponse"
          description: Source IP rate limit or in-flight limit exceeded
          headers:
            Retry-After:
              description: Suggested number of seconds before polling the returned resource or job
              schema:
                type: string
      summary: Probe a Heya server from the public internet
      tags:
        - Connectivity
  /v1/ip:
    get:
      description: Returns the source address observed by heya.media after trusted-proxy resolution. Private and reserved addresses are rejected.
      operationId: connectivity-ip
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectivityIPResult"
          description: Observed public source IP
          headers:
            Retry-After:
              schema:
                type: string
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectivityRateLimitResponse"
          description: Source IP rate limit exceeded
          headers:
            Retry-After:
              description: Suggested number of seconds before polling the returned resource or job
              schema:
                type: string
      summary: Return the caller's public source IP
      tags:
        - Connectivity
