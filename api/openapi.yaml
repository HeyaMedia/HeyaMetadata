          format: int64
          minimum: 1
          type: integer
      required:
        - retry_after_seconds
      type: object
    CreatedAPIKey:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        key:
          description: Plaintext API key; shown only in this creation response
          readOnly: true
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          items:
            type: string
          nullable: true
          type: array
      required:
        - id
        - name
        - prefix
        - key
        - scopes
        - created_at
      type: object
    DedicatedDiscoveryRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/DedicatedDiscoveryRequest.json
          format: uri
          readOnly: true
          type: string
        hints:
          $ref: "#/components/schemas/Hints"
        identifiers:
          items:
            $ref: "#/components/schemas/Identifier"
          maxItems: 50
          nullable: true
          type: array
        limit:
          format: int64
          type: integer
        query:
          type: string
      type: object
    DependencyHealth:
      additionalProperties: false
      properties:
        status:
          enum:
            - ok
            - unavailable
          example: ok
          type: string
      required:
        - status
      type: object
    DiscoveryResource:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/DiscoveryResource.json
          format: uri
          readOnly: true
          type: string
        error:
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        job:
          $ref: "#/components/schemas/JobResource"
        result:
          $ref: "#/components/schemas/Result"
        state:
          enum:
            - queued
