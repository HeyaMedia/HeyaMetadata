components:
  schemas:
    APIKey:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          items:
            type: string
          nullable: true
          type: array
      required:
        - id
        - name
        - prefix
        - scopes
        - created_at
      type: object
    AdminJob:
      additionalProperties: false
      properties:
        args: {}
        attempt:
          format: int64
          type: integer
        attempted_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        error:
          type: string
        finalized_at:
          format: date-time
          type: string
        id:
          format: int64
          type: integer
        kind:
          type: string
        max_attempts:
          format: int64
          type: integer
        priority:
          format: int64
          type: integer
        queue:
          type: string
        scheduled_at:
          format: date-time
          type: string
        state:
          type: string
      required:
        - id
        - kind
        - state
        - queue
        - attempt
        - max_attempts
        - priority
        - created_at
        - scheduled_at
      type: object
    AdminJobActionInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AdminJobActionInputBody.json
          format: uri
          readOnly: true
          type: string
        action:
          description: clear_completed removes finished history; clear_queue drops waiting jobs; rescue_stuck requeues jobs stuck running
          enum:
            - clear_completed
            - clear_queue
            - rescue_stuck
          type: string
      required:
        - action
      type: object
    AdminJobActionOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AdminJobActionOutputBody.json
          format: uri
          readOnly: true
          type: string
        action:
          type: string
        affected:
          format: int64
          type: integer
      required:
        - action
        - affected
      type: object
    AdminJobsBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AdminJobsBody.json
          format: uri
          readOnly: true
          type: string
        jobs:
          items:
            $ref: "#/components/schemas/AdminJob"
          nullable: true
          type: array
        summary:
          items:
            $ref: "#/components/schemas/JobStateCount"
          nullable: true
          type: array
        total:
          format: int64
          type: integer
      required:
        - summary
        - jobs
        - total
      type: object
    ApiKeyCreateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyCreateInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          description: Human-readable name for the client or device
          maxLength: 64
          minLength: 1
          type: string
      required:
        - name
      type: object
    ApiKeyCreateOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyCreateOutputBody.json
          format: uri
          readOnly: true
          type: string
        api_key:
          $ref: "#/components/schemas/CreatedAPIKey"
      required:
        - api_key
      type: object
    ApiKeyListOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyListOutputBody.json
          format: uri
          readOnly: true
          type: string
        api_keys:
          items:
            $ref: "#/components/schemas/APIKey"
          nullable: true
          type: array
      required:
        - api_keys
      type: object
    ArtistDisplay:
      additionalProperties: false
      properties:
        join:
          type: string
        name:
          type: string
      required:
        - name
      type: object
    AuthBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthBody.json
          format: uri
          readOnly: true
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - user
      type: object
    AuthLoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthLoginInputBody.json
          format: uri
          readOnly: true
          type: string
        altcha:
          description: Proof-of-work captcha solution; required when the captcha is enabled
          maxLength: 2048
          type: string
        password:
          format: password
          maxLength: 128
          minLength: 1
          type: string
          writeOnly: true
        username:
          maxLength: 64
          minLength: 3
          type: string
      required:
        - username
        - password
      type: object
    AuthRegisterInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthRegisterInputBody.json
          format: uri
          readOnly: true
          type: string
        altcha:
          description: Proof-of-work captcha solution; required when the captcha is enabled
          maxLength: 2048
          type: string
        password:
          format: password
          maxLength: 128
          minLength: 10
          type: string
          writeOnly: true
        username:
          maxLength: 64
          minLength: 3
          pattern: ^[A-Za-z0-9][A-Za-z0-9_.-]{1,62}[A-Za-z0-9]$
          type: string
      required:
        - username
        - password
      type: object
    BrowseOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/BrowseOutputBody.json
          format: uri
          readOnly: true
          type: string
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        results:
          items: {}
          nullable: true
          type: array
        total:
          format: int64
          type: integer
      required:
        - results
        - total
        - offset
        - limit
      type: object
    Candidate:
      additionalProperties: false
      properties:
        candidate_ref:
          format: uuid
          type: string
        confidence:
          format: double
          type: number
        display:
          $ref: "#/components/schemas/Display"
        evidence:
          items:
            $ref: "#/components/schemas/Evidence"
          nullable: true
          type: array
        match:
          type: string
        matched_episodes:
          items:
            $ref: "#/components/schemas/EpisodeHint"
          nullable: true
          type: array
        matched_releases:
          items:
            $ref: "#/components/schemas/ReleaseHint"
          nullable: true
          type: array
        matched_tracks:
          items:
            type: string
          nullable: true
          type: array
        rank:
          format: int64
          type: integer
      required:
        - rank
        - candidate_ref
        - confidence
        - match
        - display
        - evidence
      type: object
    Challenge:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/Challenge.json
          format: uri
          readOnly: true
          type: string
        algorithm:
          type: string
        challenge:
          type: string
        maxnumber:
          format: int64
          type: integer
        salt:
          type: string
        signature:
          type: string
      required:
        - algorithm
        - challenge
        - maxnumber
        - salt
        - signature
      type: object
    ChangeEntry:
      additionalProperties: false
      properties:
        change_type:
          type: string
        changed_scopes:
          items:
            type: string
          nullable: true
          type: array
        created_at:
          type: string
        entity_id:
          format: uuid
          type: string
        entity_kind:
          type: string
        projection_version:
          format: int64
          type: integer
        sequence:
          format: int64
          type: integer
        slug:
          type: string
      required:
        - sequence
        - entity_id
        - entity_kind
        - slug
        - change_type
        - changed_scopes
        - projection_version
        - created_at
      type: object
    ChangesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ChangesOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/ChangeEntry"
          type: array
        head_cursor:
          format: int64
          minimum: 0
          type: integer
        next_cursor:
          format: int64
          minimum: 0
          type: integer
        stream_id:
          format: uuid
          type: string
      required:
        - stream_id
        - head_cursor
        - entries
        - next_cursor
      type: object
    CollectionCard:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/CollectionCard.json
          format: uri
          readOnly: true
          type: string
        id:
          format: uuid
          type: string
        image_id:
          type: string
        members:
          items:
            $ref: "#/components/schemas/CollectionMember"
          nullable: true
          type: array
        name:
          type: string
        overview:
          type: string
        provider:
          type: string
        provider_id:
          type: string
      required:
        - id
        - provider
        - provider_id
        - name
        - members
      type: object
    CollectionMember:
      additionalProperties: false
      properties:
        entity_id:
          format: uuid
          type: string
        image_id:
          type: string
        order:
          format: int64
          type: integer
        provider_id:
          type: string
        resolution_state:
          enum:
            - materialized
            - unresolved
          type: string
        title:
          type: string
        year:
          format: int64
          type: integer
      required:
        - provider_id
        - title
        - order
        - resolution_state
      type: object
    CollectionsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/CollectionsOutputBody.json
          format: uri
          readOnly: true
          type: string
        collections:
          items:
            $ref: "#/components/schemas/CollectionCard"
          nullable: true
          type: array
      required:
        - collections
      type: object
    ConnectivityCheckRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ConnectivityCheckRequest.json
          format: uri
          readOnly: true
          type: string
        challenge:
          type: string
        port:
          format: int64
          type: integer
      required:
        - port
        - challenge
      type: object
    ConnectivityCheckResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ConnectivityCheckResult.json
          format: uri
          readOnly: true
          type: string
        error:
          $ref: "#/components/schemas/ProbeError"
        latency_ms:
          format: int64
          type: integer
        observed_ip:
          type: string
        reachable:
          type: boolean
        tls:
          $ref: "#/components/schemas/TLSInfo"
        verified:
          type: boolean
      required:
        - observed_ip
        - reachable
        - verified
        - latency_ms
      type: object
    ConnectivityIPResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ConnectivityIPResult.json
          format: uri
          readOnly: true
          type: string
