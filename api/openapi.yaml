components:
  schemas:
    APIKey:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          items:
            type: string
          nullable: true
          type: array
      required:
        - id
        - name
        - prefix
        - scopes
        - created_at
      type: object
    ApiKeyCreateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyCreateInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          description: Human-readable name for the client or device
          maxLength: 64
          minLength: 1
          type: string
      required:
        - name
      type: object
    ApiKeyCreateOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyCreateOutputBody.json
          format: uri
          readOnly: true
          type: string
        api_key:
          $ref: "#/components/schemas/CreatedAPIKey"
      required:
        - api_key
      type: object
    ApiKeyListOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ApiKeyListOutputBody.json
          format: uri
          readOnly: true
          type: string
        api_keys:
          items:
            $ref: "#/components/schemas/APIKey"
          nullable: true
          type: array
      required:
        - api_keys
      type: object
    ArtistDisplay:
      additionalProperties: false
      properties:
        id:
          type: string
        join:
          type: string
        name:
          type: string
      required:
        - name
      type: object
    AuthBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthBody.json
          format: uri
          readOnly: true
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - user
      type: object
    AuthLoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthLoginInputBody.json
          format: uri
          readOnly: true
          type: string
        altcha:
          description: Proof-of-work captcha solution; required when the captcha is enabled
          maxLength: 2048
          type: string
        password:
          format: password
          maxLength: 128
          minLength: 1
          type: string
          writeOnly: true
        username:
          maxLength: 64
          minLength: 3
          type: string
      required:
        - username
        - password
      type: object
    AuthRegisterInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/AuthRegisterInputBody.json
          format: uri
          readOnly: true
          type: string
        altcha:
          description: Proof-of-work captcha solution; required when the captcha is enabled
          maxLength: 2048
          type: string
        password:
          format: password
          maxLength: 128
          minLength: 10
          type: string
          writeOnly: true
        username:
          maxLength: 64
          minLength: 3
          pattern: ^[A-Za-z0-9][A-Za-z0-9_.-]{1,62}[A-Za-z0-9]$
          type: string
      required:
        - username
        - password
      type: object
    BrowseOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/BrowseOutputBody.json
          format: uri
          readOnly: true
          type: string
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        results:
          items: {}
          nullable: true
          type: array
        total:
          format: int64
          type: integer
      required:
        - results
        - total
        - offset
        - limit
      type: object
    Candidate:
      additionalProperties: false
      properties:
        confidence:
          format: double
          type: number
        display:
          $ref: "#/components/schemas/Display"
        evidence:
          items:
            $ref: "#/components/schemas/Evidence"
          nullable: true
          type: array
        existing_entity_id:
          type: string
        identity:
          $ref: "#/components/schemas/ExternalID"
        match:
          type: string
        matched_episodes:
          items:
            $ref: "#/components/schemas/EpisodeHint"
          nullable: true
          type: array
        matched_releases:
          items:
            $ref: "#/components/schemas/ReleaseHint"
          nullable: true
          type: array
        matched_tracks:
          items:
            type: string
          nullable: true
          type: array
        provider_score:
          format: int64
          type: integer
        rank:
          format: int64
          type: integer
        resolution:
          $ref: "#/components/schemas/Resolution"
      required:
        - rank
        - confidence
        - match
        - identity
        - display
        - evidence
        - resolution
      type: object
    Challenge:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/Challenge.json
          format: uri
          readOnly: true
          type: string
        algorithm:
          type: string
        challenge:
          type: string
        maxnumber:
          format: int64
          type: integer
        salt:
          type: string
        signature:
          type: string
      required:
        - algorithm
        - challenge
        - maxnumber
        - salt
        - signature
      type: object
    ChangeEntry:
      additionalProperties: false
      properties:
        change_type:
          type: string
        changed_scopes:
          items:
            type: string
          nullable: true
          type: array
        created_at:
          type: string
        entity_id:
          type: string
        entity_kind:
          type: string
        projection_version:
          format: int64
          type: integer
        sequence:
          format: int64
          type: integer
        slug:
          type: string
      required:
        - sequence
        - entity_id
        - entity_kind
        - slug
        - change_type
        - changed_scopes
        - projection_version
        - created_at
      type: object
    ChangesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://localhost:3030/schemas/ChangesOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
