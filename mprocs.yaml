# Three processes with one stable public origin:
#
#   http://127.0.0.1:3030  stable dev proxy (open this in the browser)
#   http://127.0.0.1:3031  Go API, rebuilt and restarted by Air
#   http://127.0.0.1:3032  Nuxt/Vite with HMR
#
# The proxy routes /api and /api/* to Go and everything else, including the
# Vite HMR WebSocket, to Nuxt. Press `r` on the proxy pane after editing proxy
# code; ordinary application Go edits are picked up by Air automatically.
procs:
  proxy:
    shell: "make dev-front"
  api:
    shell: "make dev-go"
  web:
    shell: "make dev-web"
